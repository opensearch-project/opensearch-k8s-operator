name: "Docker Build"
on:
  pull_request:
    branches:
      - "main"
  schedule:
    # Run weekly on Monday at 00:00 UTC for CVE scanning
    - cron: '0 0 * * 1'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  docker-build:
    runs-on: ubuntu-latest
    name: Docker Build
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.work'
          cache: false
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Docker Build
        run: |
          cd opensearch-operator
          make docker-build-multiarch

  cve-scan:
    runs-on: ubuntu-latest
    name: CVE Scan
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build image for scanning
        run: |
          cp -f LICENSE opensearch-operator/LICENSE 2>/dev/null || true
          DOCKER_BUILDKIT=1 docker build -t opensearch-operator:scan opensearch-operator/
      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.33.1
        with:
          image-ref: 'opensearch-operator:scan'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
          skip-setup-trivy: true
      - name: Run Trivy and output SARIF
        uses: aquasecurity/trivy-action@0.33.1
        if: always()
        continue-on-error: true
        with:
          image-ref: 'opensearch-operator:scan'
          format: 'sarif'
          output: 'trivy-results.sarif'
          ignore-unfixed: true
          vuln-type: 'os,library'
          skip-setup-trivy: true
      - name: Upload Trivy scan results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('trivy-results.sarif') != ''
        with:
          sarif_file: 'trivy-results.sarif'
